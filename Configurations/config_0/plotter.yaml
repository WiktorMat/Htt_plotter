plotting:
  control:
    - pt_1
    - eta_1
    - m_vis
  resolution:
  - [pt_1, pt_2]
  - [eta_1, eta_2]

plotter_runtime:
  xlim_control: 100
  xlim_resolution: 50
  bins: 20
  alpha: 0.4
  layout: stacked
  mode: raw

extra_plots:
  enable: true
  asymmetry:
    enable: true
    column: aco_mu_rho
    bins: 8
    range: [0, 6.283185307179586]
    cp_weights: true
    out_dir: plots/extra_plots
