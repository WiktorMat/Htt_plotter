selection: {}

plotting:
  # Columns come directly from data/Higgs.csv and data/Z0.csv
  control:
    - H.m
    - H.pt
    - METx
    - METy
    - trueMETx
    - trueMETy
  # Enable resolution plots for trueMET vs MET
  resolution:
  - [trueMETx, METx]
  - [trueMETy, METy]

  plotter_runtime:
    xlim_control: 100
    xlim_resolution: 50
    bins: 20
    alpha: 0.4
    layout: stacked
    mode: raw